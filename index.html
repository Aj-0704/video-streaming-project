<!DOCTYPE html>
<html lang="en">
<head>

<title>StreamX</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}
.loader {
    text-align: center;
}
.loader h2 {
    color: #e50914;
    font-size: 32px;
    margin-bottom: 10px;
}
.loader p {
    color: #aaa;

}

<body>
<div class="loader">
    <h2>🎬 StreamX</h2>
    <p>Loading...</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // 🔥 Replace with YOUR Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyC3qtsBs9hdZ4TfkIjdKSDRm0VDlacYL5w",
        authDomain: "stream-7f1b7.firebaseapp.com",
        projectId: "stream-7f1b7",
        storageBucket: "stream-7f1b7.firebasestorage.app",
        messagingSenderId: "838501338097",
        appId: "1:838501338097:web:33599d0988a5d97f0bd250",
        measurementId: "G-G02Z4L21TV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.href = "dashboard.html";
        } else {
            window.location.href = "login.html";
        }
    });
</script>
</body>
</html>
