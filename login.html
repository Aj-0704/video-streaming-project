<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - StreamX</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(0,0,0,0.85);
    padding: 40px;
    border-radius: 10px;
    width: 350px;
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #e50914;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 5px;
    font-size: 14px;
    outline: none;
    background: #fff;
    color: #333;
}

button {
    width: 100%;
    padding: 12px;
    background: #e50914;
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 5px;
    transition: background 0.3s;
}

button:hover { background: #b20710; }
button:disabled { background: #888; cursor: not-allowed; }

p { text-align: center; margin-top: 15px; font-size: 14px; }

a { color: #e50914; text-decoration: none; }

.forgot { text-align: right; font-size: 13px; margin-top: -5px; margin-bottom: 5px; }

.error-msg {
    background: rgba(229,9,20,0.15);
    border: 1px solid #e50914;
    color: #ff6b6b;
    padding: 10px;
    border-radius: 5px;
    font-size: 13px;
    margin-top: 10px;
    display: none;
}

.success-msg {
    background: rgba(40,167,69,0.15);
    border: 1px solid #28a745;
    color: #7fff9a;
    padding: 10px;
    border-radius: 5px;
    font-size: 13px;
    margin-top: 10px;
    display: none;
}
</style>
</head>

<body>
<div class="container">
    <h2>StreamX Login</h2>

    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>
    <p class="forgot"><a href="#" onclick="handleForgotPassword()">Forgot Password?</a></p>
    <button id="loginBtn" onclick="handleLogin()">Login</button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // 🔥 Replace with YOUR Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyC3qtsBs9hdZ4TfkIjdKSDRm0VDlacYL5w",
        authDomain: "stream-7f1b7.firebaseapp.com",
        projectId: "stream-7f1b7",
        storageBucket: "stream-7f1b7.firebasestorage.app",
        messagingSenderId: "838501338097",
        appId: "1:838501338097:web:33599d0988a5d97f0bd250",
        measurementId: "G-G02Z4L21TV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Auto-redirect if already logged in
    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.href = "dashboard.html";
        }
    });

    function showError(msg) {
        const el = document.getElementById("errorMsg");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("successMsg").style.display = "none";
    }

    function showSuccess(msg) {
        const el = document.getElementById("successMsg");
        el.textContent = msg;
        el.style.display = "block";
        document.getElementById("errorMsg").style.display = "none";
    }

    window.handleLogin = async function () {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");

        if (!email || !password) {
            showError("Please enter your email and password.");
            return;
        }

        btn.disabled = true;
        btn.textContent = "Logging in...";

        try {
            await signInWithEmailAndPassword(auth, email, password);
            showSuccess("Login successful! Redirecting...");
            setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);

        } catch (error) {
            btn.disabled = false;
            btn.textContent = "Login";

            switch (error.code) {
                case "auth/user-not-found":
                    showError("No account found with this email. Please sign up.");
                    break;
                case "auth/wrong-password":
                    showError("Incorrect password. Please try again.");
                    break;
                case "auth/invalid-email":
                    showError("Invalid email address.");
                    break;
                case "auth/too-many-requests":
                    showError("Too many failed attempts. Please try again later.");
                    break;
                default:
                    showError("Login failed: " + error.message);
            }
        }
    };

    window.handleForgotPassword = async function () {
        const email = document.getElementById("email").value.trim();

        if (!email) {
            showError("Please enter your email address first.");
            return;
        }

        try {
            await sendPasswordResetEmail(auth, email);
            showSuccess("Password reset email sent! Check your inbox.");
        } catch (error) {
            showError("Could not send reset email: " + error.message);
        }
    };
</script>

</body>
</html>
